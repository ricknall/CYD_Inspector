; CYD Board Inspector - native PlatformIO project
;
; This pins the same ESP32 Arduino core used by the original Arduino CLI build:
; Arduino-ESP32 3.3.1 via the pioarduino community platform.

[platformio]
default_envs = cyd2usb

[env:cyd2usb]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31-1/platform-espressif32.zip
board = esp32dev
framework = arduino

; Match the original generic ESP32 / 4 MB / DIO / 40 MHz build.
board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_build.partitions = default.csv
board_upload.flash_size = 4MB

upload_port = COM15
monitor_port = COM15
upload_protocol = esptool
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; No external libraries are required.
lib_deps =

extra_scripts =
    scripts/merge_firmware.py
